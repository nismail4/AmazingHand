nodes:
  - id: hand_tracker
    build: pip install -e HandTracking
    path: HandTracking/HandTracking/main.py
    inputs:
      tick: dora/timer/millis/50
    outputs:
      - r_hand_pos
      - wrist_pos

  - id: r_hand_simulation
    build: pip install -e AHSimulation
    path: AHSimulation/AHSimulation/mj_mink_right.py
    inputs:
      r_hand_pos: hand_tracker/r_hand_pos
      tick: dora/timer/millis/2
      tick_ctrl: dora/timer/millis/10
    outputs:
      - mj_r_joints_pos

  - id: hand_controller
    build: cargo build -p AHControl
    path: target/debug/AHControl #--serialport /dev/ttyACM0 --config AHControl/config/r_hand.toml
    args: --serialport COM8 --config AHControl/config/r_hand.toml
    inputs:
      mj_r_joints_pos: r_hand_simulation/mj_r_joints_pos

  - id: gantry_controller
    path: "C:\\Users\\nours\\OneDrive\\Desktop\\Microbots\\microbots-opencv\\.venv\\Scripts\\python.exe"
    args: gantry_move.py
    inputs:
      wrist_pos: hand_tracker/wrist_pos
      